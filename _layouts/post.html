---
layout: default
---
<p class="back"><a href="{{ '/' | relative_url }}">&larr; home</a></p>

<article>
  <h1>{{ page.title }}</h1>
  <p class="meta">
    {{ page.date | date: "%B %-d, %Y" }}
    {% assign words = content | strip_html | number_of_words %}
    &middot; {{ words | divided_by: 200 | at_least: 1 }} min read
  </p>

  {{ content }}
</article>

<p class="back"><a href="{{ '/' | relative_url }}">&larr; home</a></p>
